
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - https://git.cloudsolutions.com.sa/BASE/DEPLOYMENT-BASE-REPO/ehr/csi-ehr-data-stream-core

resources:
- ../../../DM-Initiator/

patchesStrategicMerge:
- hpa.yaml

images:
  - name: harbor.moh.gov.sa/vidamoh/csi-ehr-common-java-sev
    newName: harbors3.moh.gov.sa/vidamoh/csi-ehr-data-stream-core
    newTag: 4.0.0.0_dev #4.4.0.99_prod #4.4.0.95_prod #4.2409.22_IR9_qa 
    
namespace: vida-uat

patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: csi-ehr-data-stream-core
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 1.5Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 50m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 256Mi         

patchesJson6902:
- target:
    group: batch
    version: v1
    kind: Job
    name: sync-presync
  patch: |-
    - op: replace
      path: /metadata/name
      value: before-csi-ehr-data-stream-core
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: CSI_PROJECT_NAME
        value: "csi-ehr-data-stream-core"
- target:
    group: batch
    version: v1
    kind: Job
    name: sync-postsync
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: CSI_PROJECT_NAME
        value: "csi-ehr-data-stream-core"
    - op: replace
      path: /metadata/name
      value: after-csi-ehr-data-stream-core
