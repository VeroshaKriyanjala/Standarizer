  - target: 
      group: apps
      version: v1
      kind: Deployment
      name: csi-ehr-data-stream-core
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value: []          
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: www-persistent-storage
          mountPath: /tmp/kafka-streams
      - op: add
        path: /spec/template/spec/volumes
        value: []
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: www-persistent-storage
          persistentVolumeClaim:
            claimName: nfs-pvc